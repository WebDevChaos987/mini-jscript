<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <meta charset="UTF-8">
  <title>Mini JS&trade;</title>
  <style>
  h1, h2 {
    font-family: "Times New Roman", monospace;
    color: black;
    margin-bottom: 5px;
  }
  body {
    background-color: rgb(255, 255, 85);
    font-family: sans-serif;
    margin: 20px;
  }
  
  .playground-container {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }

  .left-side {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .right-side {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  #code-input {
    width: 100%;
    height: 400px;
    font-family: monospace;
    font-size: 14px;
    padding: 10px;
    box-sizing: border-box;
    resize: vertical;
  }

  #console-output {
    background: black; 
    color: #0f0; 
    padding: 15px; 
    font-family: monospace; 
    height: 365px;
    box-sizing: border-box;
    overflow-y: auto;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 15px;
    align-self: flex-start;
    border-radius: 80px;
    background-color: black;
    color: white;
  }
  button:hover {
    background-color: white;
    color: black;
  }
  </style>
</head>
<body>

  <h1><i>Mini JS&trade;</i></h1>
  <h2><i>Play with this Mini Javascript Playground</i></h2>
  
  <div class="playground-container">
    
    <div class="left-side">
      <button onclick="runCode()">Run Code</button>
      <div id="console-output">
        Outputs will appear here...
      </div>
    </div>

    <div class="right-side">
      <textarea id="code-input" placeholder="// Type your JavaScript here..."></textarea>
    </div>

  </div>

  <script>
    function runCode() {
      const input = document.getElementById('code-input').value;
      const consoleOutput = document.getElementById('console-output');
      
      consoleOutput.innerText = "";
      
      const originalLog = console.log;
      
      console.log = function(...args) {
        const outputText = args.map(arg => 
          typeof arg === 'object' ? JSON.stringify(arg) : arg
        ).join(' ');
        
        consoleOutput.innerText += outputText + "\n";
        originalLog.apply(console, args);
      };

      try {
        if (!input.trim()) {
          consoleOutput.innerText = 'Write Code! Run: console.log("Hello, World!");';
          return;
        }

        eval(input);
        
        if (consoleOutput.innerText === "") {
          consoleOutput.innerText = "(Code executed Successful. Console - Empty)";
        }
        
      } catch (error) {
        consoleOutput.innerText = "Error: " + error.message;
      } finally {
        console.log = originalLog;
      }
    }
  </script>
<footer>
  &copy; 2026 The Mancini Workshop&trade; | All Rights Reserved
</footer>
</body>
</html>
